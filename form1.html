<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Registration form</title>
  <style>
     img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

  </style>
</head>
<body class="bg-light">
    <h1 style="font-family: 'Franklin Gothic Medium'; text-align:center;">Registration form</h1>
  <img src="reg.jpg" alt="Registration" width="200">
  <form>
  <label>FullName: <input type="text" required /></label>
  <label>Email: <input type="email" required /></label>
  <label>Password: <input type="password" required /></label>
  <label>ConfirmPassword: <input type="password" required /></label>
  <label>DateOfBirth: <input type="date" /></label>
  <label>AcceptTerms: <input type="checkbox" required /></label>
  <button type="submit" class="btn btn-primary w-20">
          Submit 
        </button>
</form>

</body>
</html>
